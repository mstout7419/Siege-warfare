<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siege World Collisions</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; }
        #joystick { position: absolute; bottom: 50px; left: 50px; width: 100px; height: 100px; background: rgba(255,255,255,0.3); border-radius: 50%; border: 4px solid white; }
    </style>
</head>
<body>
    <div id="joystick"></div>
    <script>
        let scene, camera, renderer, player, castle, resource;
        let moveX = 0, moveZ = 0;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 1));
            
            // Floor
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshBasicMaterial({ color: 0x2d5a27 }));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Player
            player = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 2), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
            player.position.set(0, 2, 0);
            scene.add(player);

            // Castle
            castle = new THREE.Mesh(new THREE.BoxGeometry(10, 10, 10), new THREE.MeshBasicMaterial({ color: 0x8b4513 }));
            castle.position.set(30, 5, 30);
            scene.add(castle);

            // Resource
            resource = new THREE.Mesh(new THREE.BoxGeometry(4, 8, 4), new THREE.MeshBasicMaterial({ color: 0x0000ff }));
            resource.position.set(0, 4, 10);
            scene.add(resource);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            // Save old position in case we hit something
            let oldX = player.position.x;
            let oldZ = player.position.z;

            // Apply movement
            player.position.x += moveX * 0.1;
            player.position.z += moveZ * 0.1;

            // Collision Check: Castle (Distance < 8)
            if (player.position.distanceTo(castle.position) < 8) {
                player.position.x = oldX;
                player.position.z = oldZ;
            }

            // Collision Check: Resource (Distance < 10)
            if (player.position.distanceTo(resource.position) <  7) {
                player.position.x = oldX;
                player.position.z = oldZ;
                resource.material.color.set(0xff0000); // Turn red
            } else {
                resource.material.color.set(0x0000ff); // Turn blue
            }

            camera.position.set(player.position.x, player.position.y + 20, player.position.z + 40);
            camera.lookAt(player.position);
            renderer.render(scene, camera);
        }

        const joy = document.getElementById('joystick');
        joy.addEventListener('touchmove', (e) => {
            const rect = joy.getBoundingClientRect();
            let dx = (e.touches[0].clientX - (rect.left + 50)) / 50;
            let dy = (e.touches[0].clientY - (rect.top + 50)) / 50;
            moveX = Math.abs(dx) > 0.1 ? dx : 0;
            moveZ = Math.abs(dy) > 0.1 ? dy : 0;
        }, {passive: false});
        joy.addEventListener('touchend', () => { moveX = 0; moveZ = 0; });

        window.onload = init;
    </script>
</body>
</html>
