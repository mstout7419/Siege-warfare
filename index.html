<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siege World Exploration</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; }
        #joystick { position: absolute; bottom: 50px; left: 50px; width: 100px; height: 100px; background: rgba(255,255,255,0.3); border-radius: 50%; border: 4px solid white; }
    </style>
</head>
<body>
    <div id="joystick"></div>
    <script>
        let scene, camera, renderer, player, castle, resource;
        let moveX = 0, moveZ = 0;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 1));
            
            // Floor
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshBasicMaterial({ color: 0x2d5a27 }));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Player (Yellow)
            player = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 2), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
            player.position.set(0, 2, 0);
            scene.add(player);

            // Castle (Brown)
            castle = new THREE.Mesh(new THREE.BoxGeometry(10, 10, 10), new THREE.MeshBasicMaterial({ color: 0x8b4513 }));
            castle.position.set(30, 5, 30);
            scene.add(castle);

            // Resource Node (Blue)
            resource = new THREE.Mesh(new THREE.BoxGeometry(4, 4, 4), new THREE.MeshBasicMaterial({ color: 0x0000ff }));
            resource.position.set(-20, 2, -20);
            scene.add(resource);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            // Movement
            player.position.x += moveX * 0.1;
            player.position.z += moveZ * 0.1;

            // Collision Detection: Don't walk through Castle
            const dist = player.position.distanceTo(castle.position);
            if (dist < 10) {
                // If too close, push back slightly
                player.position.x -= moveX * 0.1;
                player.position.z -= moveZ * 0.1;
            }

            // Interaction Check: Close to Resource?
            if (player.position.distanceTo(resource.position) < 8) {
                resource.material.color.set(0xff0000); // Turns red when close!
            } else {
                resource.material.color.set(0x0000ff); // Blue when far
            }

            camera.position.set(player.position.x, player.position.y + 20, player.position.z + 40);
            camera.lookAt(player.position);
            renderer.render(scene, camera);
        }

        // Joystick logic (same as before)
        const joy = document.getElementById('joystick');
        joy.addEventListener('touchmove', (e) => {
            const rect = joy.getBoundingClientRect();
            let dx = (e.touches[0].clientX - (rect.left + 50)) / 50;
            let dy = (e.touches[0].clientY - (rect.top + 50)) / 50;
            moveX = Math.abs(dx) > 0.1 ? dx : 0;
            moveZ = Math.abs(dy) > 0.1 ? dy : 0;
        }, {passive: false});
        joy.addEventListener('touchend', () => { moveX = 0; moveZ = 0; });

        window.onload = init;
    </script>
</body>
</html>
