<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siege World Fixed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; touch-action: none; }
        #joystick { position: absolute; bottom: 50px; left: 50px; width: 100px; height: 100px; background: rgba(255,255,255,0.3); border-radius: 50%; border: 4px solid white; }
    </style>
</head>
<body>
    <div id="joystick"></div>
    <script>
        let scene, camera, renderer, player;
        let moveX = 0, moveZ = 0;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1));
            
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshBasicMaterial({ color: 0x2d5a27 }));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            player = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 2), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
            player.position.set(0, 2, 0);
            scene.add(player);

            const castle = new THREE.Mesh(new THREE.BoxGeometry(10, 10, 10), new THREE.MeshBasicMaterial({ color: 0x8b4513 }));
            castle.position.set(30, 5, 30);
            scene.add(castle);

            animate();
           }

            function animate() {
               requestAnimationFrame(animate);
               // Change the 1.0 to 0.3
               player.position.x += moveX * 0.3;
               player.position.z += moveZ * 0.3;

               camera.position.set(player.position.x, player.position.y + 20, player.position.z + 40);
               camera.lookAt(player.position);
               renderer.render(scene, camera);
           }


        const joy = document.getElementById('joystick');
        joy.addEventListener('touchmove', (e) => {
            const rect = joy.getBoundingClientRect();
            const centerX = rect.left + 50;
            const centerY = rect.top + 50;
            
            // Normalize input to range -1 to 1
            let dx = (e.touches[0].clientX - centerX) / 50;
            let dy = (e.touches[0].clientY - centerY) / 50;

            // Apply deadzone and ensure equal speed
            moveX = Math.abs(dx) > 0.1 ? dx : 0;
            moveZ = Math.abs(dy) > 0.1 ? dy : 0;
        }, {passive: false});

        joy.addEventListener('touchend', () => { moveX = 0; moveZ = 0; });

        window.onload = init;
    </script>
</body>
</html>
