<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siege World</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; touch-action: none; }
        #joystick { position: absolute; bottom: 50px; left: 50px; width: 100px; height: 100px; background: rgba(255,255,255,0.5); border-radius: 50%; border: 2px solid white; }
    </style>
</head>
<body>
    <div id="joystick"></div>
    <script>
        let scene, camera, renderer, player, castle;
        let moveX = 0, moveZ = 0;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1));
            
            // Green Ground
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshBasicMaterial({ color: 0x2d5a27 }));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Yellow Player
            player = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 2), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
            player.position.set(0, 2, 0);
            scene.add(player);

            // Brown Castle
            castle = new THREE.Mesh(new THREE.BoxGeometry(10, 10, 10), new THREE.MeshBasicMaterial({ color: 0x8b4513 }));
            castle.position.set(30, 5, 30);
            scene.add(castle);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            player.position.x += moveX;
            player.position.z += moveZ;

            camera.position.set(player.position.x, player.position.y + 20, player.position.z + 40);
            camera.lookAt(player.position);
            renderer.render(scene, camera);
        }

        const joy = document.getElementById('joystick');
        joy.addEventListener('touchmove', (e) => {
            moveX = (e.touches[0].clientX - 100) / 200;
            moveZ = (e.touches[0].clientY - 100) / 200;
        });
        joy.addEventListener('touchend', () => { moveX = 0; moveZ = 0; });

        window.onload = init;
    </script>
</body>
</html>
