<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siege World Smooth Camera</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; background: #87ceeb; }
        #moveJoy { position: absolute; bottom: 50px; left: 50px; width: 100px; height: 100px; background: rgba(255,255,255,0.3); border-radius: 50%; border: 4px solid white; }
    </style>
</head>
<body>
    <div id="moveJoy"></div>
    <script>
        let scene, camera, renderer, player, castle;
        let resources = [], moveX = 0, moveZ = 0, cameraAngle = 0;
        let lastTouchX = 0;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 1));
            
            // Floor & Objects
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshBasicMaterial({ color: 0x2d5a27 }));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            player = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 2), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
            player.position.set(0, 2, 0);
            scene.add(player);

            castle = new THREE.Mesh(new THREE.BoxGeometry(10, 10, 10), new THREE.MeshBasicMaterial({ color: 0x8b4513 }));
            castle.position.set(30, 5, 30);
            scene.add(castle);

            for (let i = 0; i < 8; i++) {
                let node = new THREE.Mesh(new THREE.BoxGeometry(4, 8, 4), new THREE.MeshBasicMaterial({ color: 0x0000ff }));
                node.position.set(Math.random() * 60 - 30, 4, Math.random() * 60 - 30);
                scene.add(node);
                resources.push(node);
            }
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            let oldX = player.position.x;
            let oldZ = player.position.z;

            player.position.x += moveX * 0.1;
            player.position.z += moveZ * 0.1;

            // Collision logic
            if (player.position.distanceTo(castle.position) < 8) { player.position.x = oldX; player.position.z = oldZ; }
            resources.forEach(node => {
                if (player.position.distanceTo(node.position) < 7) {
                    player.position.x = oldX; player.position.z = oldZ;
                    node.material.color.set(0xff0000);
                } else { node.material.color.set(0x0000ff); }
            });

            // Camera follows player with rotation
            let camX = player.position.x + Math.sin(cameraAngle) * 40;
            let camZ = player.position.z + Math.cos(cameraAngle) * 40;
            camera.position.set(camX, player.position.y + 20, camZ);
            camera.lookAt(player.position);
            renderer.render(scene, camera);
        }

        // Left Joystick (Movement)
        const moveJoy = document.getElementById('moveJoy');
        moveJoy.addEventListener('touchmove', (e) => {
            const rect = moveJoy.getBoundingClientRect();
            moveX = (e.touches[0].clientX - (rect.left + 50)) / 50;
            moveZ = (e.touches[0].clientY - (rect.top + 50)) / 50;
        }, {passive: false});
        moveJoy.addEventListener('touchend', () => { moveX = 0; moveZ = 0; });

        // Right side of screen (Camera rotation)
        window.addEventListener('touchmove', (e) => {
            if (e.touches[0].clientX > window.innerWidth / 2) {
                let delta = e.touches[0].clientX - lastTouchX;
                cameraAngle += delta * 0.01;
            }
            lastTouchX = e.touches[0].clientX;
        }, {passive: false});
        
        window.addEventListener('touchstart', (e) => { lastTouchX = e.touches[0].clientX; });

        window.onload = init;
    </script>
</body>
</html>
